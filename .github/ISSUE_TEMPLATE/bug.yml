name: 🐛 Bug
description: If you ran into an error or faulty plugin behavior
title: '[Bug]: <Summary of your issue>'
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this issue 🙏

        Before proceeding, please make sure to check the following sources first. Maybe the answer you're looking for is already there 😌
        - 📗 [Opened issues](https://github.com/bandantonio/obsidian-apple-books-highlights-plugin/issues?q=is%3Aissue%20state%3Aopen%20label%3Abug)
        - 📗 [Plugin documentation](https://github.com/bandantonio/obsidian-apple-books-highlights-plugin/blob/master/README.md)
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also, include screenshots, console output errors (if any), and any other related information.
      placeholder: Please provide an explicit description of your issue, steps to reproduce, and what you expected to happen instead.
    validations:
      required: true
  - type: dropdown
    id: behavior
    attributes:
      label: When does the issue occur?
      options:
        - Importing all books
        - Importing a single book
        - In both cases
      default: 1
    validations:
      required: true
  - type: dropdown
    id: how-many-books
    attributes:
      label: How many books do you have in your Apple Books library?
      description: An approximate number is fine. May help identify potential performance issues.
      options:
        - '20 or less'
        - '21 - 50'
        - '51 - 100'
        - '100+'
    validations:
      required: true
  - type: markdown
    id: debug-info-instructions
    attributes:
      value: |
        #### Debug information
        Instead of copy-pasting from various places and filling out a myriad of fields about your Obsidian environment and plugin settings, please run the following script ***inside your Obsidian console*** that will do the heavy lifting for you and provide all the necessary debug information in a structured format:
        - Obsidian and Installer versions
        - Operating system version and release
        - Plugin settings (you can review the settings before sharing them to make sure no sensitive information is included)

        ```js
        const os = require('os');
        console.info({
          'Obsidian version': window.electron.ipcRenderer.sendSync('version'),
          'Installer version': window.electron.remote.app.getVersion(),
          'Operating system': os.version() + ' ' + os.release(),
          'Plugin settings': app.plugins.plugins['apple-books-import-highlights'].settings
        });
        ```

        To run the script:
        1. In your Obsidian, press `Command + Option + I` to open the developer tools.
        2. Paste the script to the console and press Enter.
        3. Right-click the line with the output and select "Copy object"
        4. Paste the copied output in the field below
  - type: textarea
    id: user-debug-info
    attributes:
      label: Debug information
      placeholder: Paste the debug information from the script here
      render: json
    validations:
      required: true
